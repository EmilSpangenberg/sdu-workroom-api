# SDU Workroom Finder - Docker Setup
# Start med: docker-compose up
# Stop med: Ctrl+C eller docker-compose down

version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:16
    container_name: sdu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sdu_workrooms
    ports:
      - "5432:5432"
    volumes:
      # Gem data så det ikke forsvinder når container stoppes
      - postgres_data:/var/lib/postgresql/data
      # Kør schema.sql automatisk ved første start
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
